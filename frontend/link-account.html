<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Link Account – Project SA</title>
  <link rel="stylesheet" href="../main/css/style.css"/>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-text">PROJECT SA</span>
      <span class="logo-sub">Cinema Experience</span>
    </div>
    <h2>Link Gmail Account</h2>
    <p class="subtitle">Connect Google for one-click sign-in</p>
    <div id="notLinked">
      <p style="color:var(--muted);font-size:0.88rem;margin-bottom:1.5rem;line-height:1.6;">
        We only request access to your email address. We will never post or send emails on your behalf.
      </p>
      <button id="linkBtn" class="btn btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 7.9 2.9l5.9-5.9C34.3 3.2 29.4 1 24 1 14.8 1 7 6.7 3.7 14.5l6.9 5.4C12.3 13.4 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.6 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.3-9.9 6.3-16.9z"/><path fill="#FBBC05" d="M10.6 28.5c-.5-1.5-.8-3.1-.8-4.8s.3-3.3.8-4.8L3.7 14c-1.5 3-2.4 6.3-2.4 9.7s.9 6.7 2.4 9.7l6.9-5.4z"/><path fill="#34A853" d="M24 47c5.4 0 9.9-1.8 13.2-4.8l-7.4-5.7c-1.8 1.2-4.1 1.9-5.8 1.9-6.4 0-11.7-4-13.4-9.4l-6.9 5.4C7 41.3 14.8 47 24 47z"/></svg>
        Connect with Google
      </button>
    </div>
    <div id="linked" style="display:none;text-align:center;">
      <div class="alert-box success">✅ Gmail linked successfully!</div>
      <a href="movie-list.html" class="btn btn-primary" style="margin-top:1rem;">Go to Movies</a>
    </div>
    <div class="auth-footer"><a href="login.html">← Back to Sign In</a></div>
  </div>
  <script src="../js/form-validation.js"></script>
  <script>
    document.getElementById('linkBtn').addEventListener('click', async function() {
      this.innerHTML = '<span class="spinner"></span> Connecting…'; this.disabled = true;
      const fakeGoogleId = 'google_' + Math.random().toString(36).substr(2, 9);
      const { ok, data } = await apiRequest('/auth/link-google', 'POST', { googleId: fakeGoogleId });
      if (ok) {
        document.getElementById('notLinked').style.display = 'none';
        document.getElementById('linked').style.display = 'block';
      } else {
        showToast(data.message || 'Failed to link.', 'error');
        this.textContent = 'Connect with Google'; this.disabled = false;
      }
    });
  </script>
</body>
</html>
