<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Password – Project SA</title>
  <link rel="stylesheet" href="../main/css/style.css" />
</head>
<body>
  <div class="form-card">
    <div class="card-header">
      <span class="icon">🔒</span>
      <h2>Set New Password</h2>
      <p>Choose a strong password</p>
    </div>

    <div id="formWrap">
      <form id="newPwForm" novalidate>
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" required />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Update Password</button>
      </form>
    </div>

    <div id="success" style="display:none;text-align:center;">
      <div class="alert">✅ Password updated successfully!</div>
      <a href="login.html" class="btn btn-primary" style="margin-top:1rem;">Login</a>
    </div>

    <div id="invalidToken" style="display:none;text-align:center;">
      <div class="alert" style="border-color:#c0392b;background:rgba(192,57,43,0.1);color:#e74c3c;">
        ❌ This reset link is invalid or has expired.
      </div>
      <a href="reset-password.html" class="btn btn-secondary" style="margin-top:1rem;">Request New Link</a>
    </div>
  </div>

  <script src="../js/form-validation.js"></script>
  <script>
    // Extract token from URL: /pages/new-password.html?token=xxx
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('formWrap').style.display = 'none';
      document.getElementById('invalidToken').style.display = 'block';
    }

    document.getElementById('newPwForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      const cpw = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('submitBtn');

      if (pw.length < 8) return showToast('Password must be at least 8 characters.', 'error');
      if (pw !== cpw) return showToast('Passwords do not match.', 'error');

      btn.textContent = 'Updating…';
      btn.disabled = true;

      const { ok, data } = await apiRequest('/auth/new-password', 'POST', { token, password: pw });

      if (ok) {
        saveToken(data.token);
        document.getElementById('formWrap').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      } else {
        if (data.message.includes('invalid') || data.message.includes('expired')) {
          document.getElementById('formWrap').style.display = 'none';
          document.getElementById('invalidToken').style.display = 'block';
        } else {
          showToast(data.message || 'Failed to update password.', 'error');
          btn.textContent = 'Update Password';
          btn.disabled = false;
        }
      }
    });
  </script>
</body>
</html>
