<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – Project SA</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-text">PROJECT SA</span>
      <span class="logo-sub">Cinema Experience</span>
    </div>
    <h2>Create Account</h2>
    <p class="subtitle">Join and start watching today</p>

    <form id="signupForm" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Your Name" required/>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" required/>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" required/>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Create Account</button>
      <div class="divider">or</div>
      <a href="link-account.html" class="btn btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 7.9 2.9l5.9-5.9C34.3 3.2 29.4 1 24 1 14.8 1 7 6.7 3.7 14.5l6.9 5.4C12.3 13.4 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.6 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.3-9.9 6.3-16.9z"/><path fill="#FBBC05" d="M10.6 28.5c-.5-1.5-.8-3.1-.8-4.8s.3-3.3.8-4.8L3.7 14c-1.5 3-2.4 6.3-2.4 9.7s.9 6.7 2.4 9.7l6.9-5.4z"/><path fill="#34A853" d="M24 47c5.4 0 9.9-1.8 13.2-4.8l-7.4-5.7c-1.8 1.2-4.1 1.9-5.8 1.9-6.4 0-11.7-4-13.4-9.4l-6.9 5.4C7 41.3 14.8 47 24 47z"/></svg>
        Sign Up with Google
      </a>
    </form>
    <div class="auth-footer">Already have an account? <a href="login.html">Sign In</a></div>
  </div>
  <script src="../js/form-validation.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      const cpw = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('submitBtn');
      if (!name) return showToast('Please enter your name.', 'error');
      if (!validateEmail(email)) return showToast('Invalid email address.', 'error');
      if (pw.length < 8) return showToast('Password must be 8+ characters.', 'error');
      if (pw !== cpw) return showToast('Passwords do not match.', 'error');
      btn.innerHTML = '<span class="spinner"></span> Creating…';
      btn.disabled = true;
      const { ok, data } = await apiRequest('/auth/signup', 'POST', { name, email, password: pw });
      if (ok) {
        saveToken(data.token); saveUser(data.user);
        showToast(`Welcome, ${data.user.name}! 🎬`);
        setTimeout(() => window.location.href = 'movie-list.html', 900);
      } else {
        showToast(data.message || 'Signup failed.', 'error');
        btn.textContent = 'Create Account'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
