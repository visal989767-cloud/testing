<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – Project SA</title>
  <link rel="stylesheet" href="../main/css/style.css"/>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-text">PROJECT SA</span>
      <span class="logo-sub">Cinema Experience</span>
    </div>
    <h2>Reset Password</h2>
    <p class="subtitle">Enter your email to receive a reset link</p>
    <div id="step1">
      <form id="resetForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required/>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Send Reset Link</button>
      </form>
    </div>
    <div id="step2" style="display:none;text-align:center;padding:1rem 0;">
      <div class="alert-box success">✅ If that email exists, a reset link has been sent.</div>
      <a href="login.html" class="btn btn-outline" style="margin-top:1rem;">Back to Sign In</a>
    </div>
    <div class="auth-footer" style="margin-top:1.5rem;">Remembered it? <a href="login.html">Sign In</a></div>
  </div>
  <script src="../js/form-validation.js"></script>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('submitBtn');
      if (!validateEmail(email)) return showToast('Please enter a valid email.', 'error');
      btn.innerHTML = '<span class="spinner"></span> Sending…'; btn.disabled = true;
      const { ok, data } = await apiRequest('/auth/reset-password', 'POST', { email });
      if (ok) {
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
      } else {
        showToast(data.message || 'Something went wrong.', 'error');
        btn.textContent = 'Send Reset Link'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
